<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Vehicle Detection</title>
  <style>
    body { font-family: monospace; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    button { padding: 8px 16px; margin: 10px 0; cursor: pointer; }
    img { max-width: 100%; margin-top: 16px; border-radius: 6px; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 6px; font-size: 13px; }
  </style>
</head>
<body>
  <h2>Vehicle Detection</h2>
  <input type="file" id="fileInput" accept="image/*"/>
  <br>
  <button onclick="upload()">Detect</button>

  <div id="output"></div>

  <script>
    async function upload() {
      const file = document.getElementById('fileInput').files[0];
      if (!file) return;

      document.getElementById('output').innerHTML = 'Processing...';

      const form = new FormData();
      form.append('file', file);

      const res = await fetch('/detect', { method: 'POST', body: form });
      const data = await res.json();

      document.getElementById('output').innerHTML = `
        <p>Найдено объектов: <b>${data.total}</b></p>
        <img src="data:image/jpeg;base64,${data.image}" />
        <pre>${JSON.stringify(data.detections, null, 2)}</pre>
      `;
    }
  </script>
</body>
</html>
